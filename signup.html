<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Explore</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--sand:#F5EDD6;--earth:#C8A96E;--rust:#C4522A;--forest:#2D4A3E;--night:#0F1A14;--gold:#D4A843;--cream:#FAF6EE;--text-dark:#1A1A1A;--text-muted:#6B7280;--transition:all 0.35s cubic-bezier(0.4,0,0.2,1)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--night);min-height:100vh}
    .nav-logo{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;font-style:italic;color:var(--gold);text-decoration:none}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .auth-layout{display:grid;grid-template-columns:1fr 1fr;min-height:100vh}
    .auth-panel{position:relative;overflow:hidden;display:flex;align-items:flex-end}
    .auth-panel-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .auth-panel-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(15,26,20,0.95) 0%,rgba(45,74,62,0.5) 60%,transparent 100%)}
    .auth-panel-content{position:relative;z-index:2;padding:3rem;color:var(--sand)}
    .auth-panel-content .nav-logo{display:block;margin-bottom:3rem;font-size:2rem}
    blockquote{font-family:'Playfair Display',serif;font-size:1.3rem;font-style:italic;line-height:1.5;color:var(--sand);margin-bottom:2rem}
    blockquote cite{display:block;font-style:normal;font-size:0.8rem;opacity:0.6;margin-top:0.8rem;letter-spacing:0.1em;text-transform:uppercase}
    .panel-destinations{display:flex;flex-direction:column;gap:0.6rem}
    .mini-dest{font-size:0.85rem;opacity:0.7}
    .auth-form-side{background:var(--cream);display:flex;align-items:center;justify-content:center;padding:3rem 2rem;overflow-y:auto}
    .auth-form-wrap{width:100%;max-width:440px;animation:fadeUp 0.6s ease both}
    .auth-header{margin-bottom:2rem}
    .auth-header h1{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;color:var(--night);margin-bottom:0.5rem}
    .auth-header p{color:var(--text-muted);font-size:0.95rem}
    .social-btn{display:flex;align-items:center;justify-content:center;gap:0.8rem;width:100%;padding:0.85rem;background:#fff;border:1.5px solid #e2e8f0;border-radius:2px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:500;color:var(--text-dark);transition:var(--transition);margin-bottom:1.5rem}
    .social-btn:hover{border-color:var(--earth)}
    .divider{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;color:var(--text-muted);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.08em}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e2e8f0}
    .auth-form{display:flex;flex-direction:column;gap:1rem}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .form-group{display:flex;flex-direction:column;gap:0.4rem}
    .form-group label{font-size:0.82rem;font-weight:600;color:var(--text-dark)}
    .form-group input,.form-group select{width:100%;padding:0.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:2px;background:#fff;font-family:'DM Sans',sans-serif;font-size:0.95rem;color:var(--text-dark);transition:var(--transition);outline:none}
    .form-group input:focus,.form-group select:focus{border-color:var(--earth);box-shadow:0 0 0 3px rgba(200,169,110,0.15)}
    .input-wrap{position:relative}
    .input-wrap input{width:100%;padding:0.75rem 3rem 0.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:2px;background:#fff;font-family:'DM Sans',sans-serif;font-size:0.95rem;color:var(--text-dark);transition:var(--transition);outline:none}
    .input-wrap input:focus{border-color:var(--earth);box-shadow:0 0 0 3px rgba(200,169,110,0.15)}
    .toggle-pw{position:absolute;right:0.8rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;opacity:0.5}
    .strength-bar{height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden}
    .strength-fill{height:100%;width:0%;border-radius:2px;transition:width 0.3s ease,background 0.3s ease}
    .strength-label{font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem}
    .form-check{display:flex;align-items:center;gap:0.6rem;font-size:0.85rem;color:var(--text-muted)}
    .form-check input[type="checkbox"]{width:16px;height:16px;accent-color:var(--rust)}
    .form-check a{color:var(--rust);text-decoration:none}
    .btn-primary{background:var(--rust);color:#fff;width:100%;padding:0.9rem;font-size:0.95rem;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;border:none;cursor:pointer;border-radius:2px;transition:var(--transition);margin-top:0.5rem}
    .btn-primary:hover{background:var(--gold);color:var(--night)}
    .auth-switch{text-align:center;margin-top:1.5rem;font-size:0.9rem;color:var(--text-muted)}
    .auth-switch a{color:var(--rust);text-decoration:none;font-weight:600}
    @media(max-width:768px){
      .auth-layout{grid-template-columns:1fr}
      .auth-panel{display:none}
      .form-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="auth-layout">
    <div class="auth-panel">
      <img src="https://images.unsplash.com/photo-1500835556837-99ac94a94552?w=900&q=80" alt="Travel" class="auth-panel-img" />
      <div class="auth-panel-overlay"></div>
      <div class="auth-panel-content">
        <a href="index.html" class="nav-logo"><em>Explore</em></a>
        <blockquote>"Not all those who wander are lost —<br/>some are just finding themselves."<cite>— Our Community</cite></blockquote>
        <div class="panel-destinations">
          <div class="mini-dest">✅ Free forever</div>
          <div class="mini-dest">✍️ Publish stories</div>
          <div class="mini-dest">🌍 Join 50K travellers</div>
        </div>
      </div>
    </div>
    <div class="auth-form-side">
      <div class="auth-form-wrap">
        <div class="auth-header">
          <h1>Start Exploring</h1>
          <p>Create your free account and join 50,000+ travellers sharing adventures.</p>
        </div>
        <button class="social-btn">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.745 12.27c0-.79-.07-1.54-.19-2.27h-11.3v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.86c2.26-2.09 3.56-5.17 3.56-8.82z"/><path fill="#34A853" d="M12.255 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96h-3.98v3.09C3.515 21.3 7.615 24 12.255 24z"/><path fill="#FBBC05" d="M5.525 14.29c-.25-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.62h-3.98a11.86 11.86 0 0 0 0 10.76l3.98-3.09z"/><path fill="#EA4335" d="M12.255 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C18.205 1.19 15.495 0 12.255 0c-4.64 0-8.74 2.7-10.71 6.62l3.98 3.09c.95-2.85 3.6-4.96 6.73-4.96z"/></svg>
          Sign up with Google
        </button>
        <div class="divider"><span>or create with email</span></div>
        <form class="auth-form" id="signupForm">
          <div class="form-row">
            <div class="form-group"><label>First Name</label><input type="text" placeholder="Riya" required /></div>
            <div class="form-group"><label>Last Name</label><input type="text" placeholder="Shah" required /></div>
          </div>
          <div class="form-group"><label>Email Address</label><input type="email" placeholder="you@example.com" required /></div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <input type="password" id="password" placeholder="Min. 8 characters" required minlength="8" />
              <button type="button" class="toggle-pw" id="togglePw">👁</button>
            </div>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <p class="strength-label" id="strengthLabel"></p>
          <div class="form-group"><label>Where are you from? <span style="opacity:0.5">(optional)</span></label><input type="text" placeholder="e.g. Mumbai, India" /></div>
          <div class="form-check">
            <input type="checkbox" id="terms" required />
            <label for="terms">I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></label>
          </div>
          <button type="submit" class="btn-primary">Create Free Account</button>
        </form>
        <p class="auth-switch">Already have an account? <a href="login.html">Sign in →</a></p>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('togglePw').addEventListener('click', function() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
      this.textContent = pw.type === 'password' ? '👁' : '🙈';
    });
    document.getElementById('password').addEventListener('input', function() {
      const v = this.value;
      let score = 0;
      if(v.length>=8) score++; if(/[A-Z]/.test(v)) score++; if(/[0-9]/.test(v)) score++; if(/[^A-Za-z0-9]/.test(v)) score++;
      const fills=['','#e74c3c','#f39c12','#2ecc71','#27ae60'];
      const labels=['','Weak','Fair','Good','Strong'];
      document.getElementById('strengthFill').style.width=score*25+'%';
      document.getElementById('strengthFill').style.background=fills[score];
      document.getElementById('strengthLabel').textContent=v.length?labels[score]:'';
    });
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = this.querySelector('.btn-primary');
      btn.textContent = '✓ Account created! Welcome to Explore!';
      btn.style.background = '#2ecc71';
      setTimeout(() => { window.location.href = 'index.html'; }, 1500);
    });
  </script>
</body>
</html>
